<!DOCTYPE html>
<html>
<head>
  <title>Arvin App</title>

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: linear-gradient(135deg, #667eea, #764ba2);
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }

    .header {
      text-align: center;
      color: white;
      margin-top: 40px;
    }

    .header h1 {
      margin: 0;
      font-size: 40px;
    }

    .header p {
      margin: 5px 0 20px;
      opacity: 0.8;
    }

    .app {
      background: white;
      padding: 25px;
      width: 320px;
      border-radius: 15px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      margin-bottom: 20px;
    }

    input {
      width: 70%;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 5px;
      margin-top: 10px;
    }

    button {
      padding: 10px;
      border: none;
      background: #667eea;
      color: white;
      border-radius: 5px;
      cursor: pointer;
      margin-top: 10px;
    }

    button:hover {
      background: #5a67d8;
    }

    li {
      margin-top: 10px;
      display: flex;
      justify-content: space-between;
      background: #f4f4f4;
      padding: 8px;
      border-radius: 5px;
    }

    .delete {
      background: red;
      color: white;
      border: none;
      padding: 5px 8px;
      border-radius: 5px;
      cursor: pointer;
    }

    .calc-buttons button {
      width: 60px;
      margin-right: 5px;
    }
  </style>
</head>

<body>

  <div class="header">
    <h1>Arvin</h1>
    <img src="photo.jpg" width="150">
    <p>Randhir maan 🚀</p>
  </div>

  <!-- TO DO APP -->
  <div class="app">

    <h2>To-Do List</h2>

    <input id="taskInput" type="text" placeholder="Enter task">
    <button onclick="addTask()">Add</button>

    <ul id="taskList"></ul>

  </div>

  <!-- CALCULATOR -->
  <div class="app">

    <h2>Calculator</h2>

    <input id="num1" type="number" placeholder="First number">
    <input id="num2" type="number" placeholder="Second number">

    <div class="calc-buttons">
      <button onclick="calculate('+')">+</button>
      <button onclick="calculate('-')">-</button>
      <button onclick="calculate('*')">*</button>
      <button onclick="calculate('/')">/</button>
    </div>

    <h3 id="result">Result: 0</h3>

  </div>

  <script>

    // LOAD SAVED TASKS
    window.onload = function () {
      let saved = JSON.parse(localStorage.getItem("tasks")) || [];
      saved.forEach(task => createTask(task));
    };

    // ADD TASK
    function addTask() {
      let input = document.getElementById("taskInput");
      let task = input.value.trim();

      if (task === "") return;

      createTask(task);
      saveTask(task);

      input.value = "";
    }

    // CREATE TASK
    function createTask(task) {
      let li = document.createElement("li");

      li.innerHTML = `
        ${task}
        <button class="delete" onclick="deleteTask(this, '${task}')">X</button>
      `;

      document.getElementById("taskList").appendChild(li);
    }

    // DELETE TASK
    function deleteTask(btn, task) {
      btn.parentElement.remove();

      let tasks = JSON.parse(localStorage.getItem("tasks")) || [];
      tasks = tasks.filter(t => t !== task);

      localStorage.setItem("tasks", JSON.stringify(tasks));
    }

    // SAVE TASK
    function saveTask(task) {
      let tasks = JSON.parse(localStorage.getItem("tasks")) || [];

      tasks.push(task);

      localStorage.setItem("tasks", JSON.stringify(tasks));
    }

    // CALCULATOR
    function calculate(operator) {

      let num1 = Number(document.getElementById("num1").value);
      let num2 = Number(document.getElementById("num2").value);

      let result = 0;

      if (operator === "+") {
        result = num1 + num2;
      }

      else if (operator === "-") {
        result = num1 - num2;
      }

      else if (operator === "*") {
        result = num1 * num2;
      }

      else if (operator === "/") {
        result = num2 !== 0 ? num1 / num2 : "Cannot divide by 0";
      }

      document.getElementById("result").innerText =
        "Result: " + result;
    }

  </script>

</body>
</html>
